short_bio: >-
  <p>
    My primary research focus is <b>AI Psychology</b>, a field where I seek to understand and advance Artificial Intelligence by examining it through the lens of human behavioral and cognitive foundations.
  </p>
  <p>
    To achieve a more rational and grounded understanding of AI, I investigate human decision-making processes using <b>multimodal sensing technologies</b> such as VR, Eye-Tracking, and EEG. By integrating these human-centric insights back into AI development, I aim to bridge the gap between machine intelligence and human cognition.
  </p>

